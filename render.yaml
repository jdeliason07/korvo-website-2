services:
  - type: web
    name: korvo-ai
    runtime: node
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: PORT
        value: 3000
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_TO
        sync: false
      - key: ADMIN_PASS
        sync: false
      # Discovery-call storage. Set DATABASE_URL to use Postgres, or DATA_DIR
      # (a mounted persistent disk) to keep the JSON fallback across deploys.
      - key: DATABASE_URL
        sync: false
      - key: DATA_DIR
        sync: false
